name: Release

on:
  # FIXED: Changed from pull_request_target to push on tags only.
  # pull_request_target runs with write permissions and access to secrets,
  # making checkout of PR head SHA a critical supply chain risk (pwn request).
  push:
    tags:
      - 'v*'

# FIXED: Replaced write-all with minimal required permissions (least privilege).
# write-all grants every permission to every step; a compromised action or
# injected script can exfiltrate secrets or tamper with releases.
permissions:
  contents: read
  packages: write  # required for pushing to container registry

jobs:
  build-and-publish:
    # FIXED: Pin to a specific Ubuntu version instead of 'ubuntu-latest'
    # to avoid unexpected runner image changes that could introduce untrusted tooling.
    runs-on: ubuntu-24.04
    steps:
      # FIXED: All actions are pinned to their full commit SHA, not a mutable tag.
      # Mutable tags (e.g. @v4) can be moved by the action author or an attacker
      # who compromises the upstream repo, enabling arbitrary code execution.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        # FIXED: Removed 'ref: github.event.pull_request.head.sha'.
        # That pattern with pull_request_target checks out untrusted PR code
        # with write access to repository secrets -- a classic pwn request attack.

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # FIXED: docker/build-push-action pinned to commit SHA instead of @v5.
      # Also added image tag derived from the git tag (${{ github.ref_name }})
      # instead of always publishing to 'latest', which prevents overwriting
      # known-good images and improves traceability.
      - name: Publish to registry
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75  # v6.9.0
        with:
          push: true
          tags: |
            myorg/myapp:${{ github.ref_name }}

      # FIXED: Secrets are scoped to only the deploy step that needs them.
      # Removed DATABASE_URL and STRIPE_SECRET_KEY -- a deploy script should
      # not need database credentials or payment processor keys at deploy time.
      # If those are genuinely required, they should be fetched at runtime from
      # a secrets manager (e.g. AWS Secrets Manager) rather than injected as env vars.
      - name: Deploy
        run: ./scripts/deploy.sh
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # DATABASE_URL and STRIPE_SECRET_KEY removed: these should be fetched
          # at application runtime from a secrets manager, not injected into CI.

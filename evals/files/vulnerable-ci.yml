name: CI

on:
  push:
    branches: [main]
  pull_request:
  issues:
    types: [opened, edited]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Label issue
        run: |
          echo "Processing issue: ${{ github.event.issue.title }}"
          gh issue edit "${{ github.event.issue.number }}" --add-label "triaged"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: triage-log
          path: /tmp/triage.log
